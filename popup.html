<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>Volumifier</title>
  </head>
  <body>
    <div class="app">
      <header class="head">
        <div class="brand">
          <span class="logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none">
              <path d="M4 9v6h4l5 5V4L8 9H4z" fill="currentColor" />
              <path d="M16 8a5 5 0 0 1 0 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <path d="M18.5 5.5a9 9 0 0 1 0 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </span>
          <div class="titles">
            <h1>Volumifier</h1>
            <p id="tabName" class="sub" data-i18n="reading">Reading active tab…</p>
          </div>
        </div>
        <div class="headActions">
          <a id="ghBtn" class="ghBtn" href="https://github.com/daricvn/volumifier" title="View source on GitHub" aria-label="View source on GitHub" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
          </a>
          <div class="langWrap">
            <button id="langBtn" class="langBtn" data-i18n-title="language" data-i18n-aria="language" title="Language" aria-label="Language" aria-haspopup="true" aria-expanded="false">
              <span class="flag" id="langFlag" aria-hidden="true"></span>
              <svg class="chev" viewBox="0 0 24 24" width="11" height="11" fill="none" aria-hidden="true">
                <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
            <ul id="langMenu" class="langMenu" role="listbox"></ul>
          </div>
          <button id="powerBtn" class="power" data-i18n-title="reset" data-i18n-aria="reset" title="Reset to 100%" aria-label="Reset to 100%">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
              <path d="M20 11A8 8 0 1 0 17.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <path d="M20 4v7h-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </header>

      <div class="dial" id="dial" tabindex="0" role="slider" aria-label="Tab volume" aria-valuemin="0" aria-valuemax="600" aria-valuenow="100">
        <div class="rings" id="rings">
          <span class="ring"></span><span class="ring"></span><span class="ring"></span>
        </div>
        <div class="readout">
          <span id="value" class="value">100</span><span class="pct">%</span>
        </div>
        <div id="boostBadge" class="badge" data-i18n="boosted">BOOSTED</div>
      </div>

      <div class="modeGroup" role="group" aria-label="Boost mode">
        <button class="modeBtn active" data-mode="generic" data-i18n-title="modeGenericTitle" title="Boost everything">
          <span data-i18n="modeGeneric">Generic</span>
        </button>
        <button class="modeBtn" data-mode="voice" data-i18n-title="modeVoiceTitle" title="Boost voice only">
          <svg class="modeIcon mic" viewBox="0 0 24 24" width="14" height="14" fill="none" aria-hidden="true">
            <rect x="9" y="3" width="6" height="11" rx="3" fill="currentColor" />
            <path d="M6 11a6 6 0 0 0 12 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M12 17v3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
          <span data-i18n="modeVoice">Voice</span>
        </button>
        <button class="modeBtn" data-mode="bass" data-i18n-title="modeBassTitle" title="Boost bass only">
          <svg class="modeIcon bars" viewBox="0 0 24 24" width="14" height="14" fill="none" aria-hidden="true">
            <rect class="bar b1" x="4" y="9" width="3" height="6" rx="1.5" fill="currentColor" />
            <rect class="bar b2" x="10.5" y="5" width="3" height="14" rx="1.5" fill="currentColor" />
            <rect class="bar b3" x="17" y="10" width="3" height="4" rx="1.5" fill="currentColor" />
          </svg>
          <span data-i18n="modeBass">Bass</span>
        </button>
      </div>

      <div class="sliderRow">
        <button id="muteBtn" class="volIcon" data-v="0" data-i18n-title="mute" data-i18n-aria="mute" title="Mute (0%)" aria-label="Mute (0%)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
            <path d="M4 9v6h4l5 5V4L8 9H4z" fill="currentColor" />
            <path d="M16 9l5 6M21 9l-5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
        <div class="sliderWrap">
          <input
            id="slider"
            class="slider"
            type="range"
            min="0"
            max="600"
            step="1"
            value="100"
            aria-label="Tab volume"
          />
          <div class="ticks">
            <span class="round-border" data-v="10">10</span>
            <span data-v="100">100</span>
            <span data-v="200">200</span>
            <span data-v="400">400</span>
          </div>
        </div>
        <button id="maxBtn" class="volIcon" data-v="600" data-i18n-title="max" data-i18n-aria="max" title="Max (600%)" aria-label="Max (600%)">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
            <path d="M4 9v6h4l5 5V4L8 9H4z" fill="currentColor" />
            <path d="M16 8a5 5 0 0 1 0 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M18.5 5.5a9 9 0 0 1 0 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
      </div>

      <div class="autoRow">
        <button id="autoBtn" class="autoChip" role="switch" aria-checked="false" data-i18n-title="autoLevelTitle" data-i18n-aria="autoLevel" title="Even out loud and quiet audio">
          <span class="autoLabel" data-i18n="autoLevel">Auto-level</span>
          <span class="switch"><span class="knob"></span></span>
        </button>
        <button id="fsBtn" class="autoChip" role="switch" aria-checked="false" data-i18n-title="fsModeTitle" data-i18n-aria="fsMode" title="Keep video fullscreen working while boosting">
          <span class="autoLabel" data-i18n="fsMode">Fullscreen mode</span>
          <span class="switch"><span class="knob"></span></span>
        </button>
      </div>

      <div id="audioTabsSection" class="audioTabs">
        <p class="sectionLabel" data-i18n="playingAudio">Playing audio</p>
        <ul id="tabList" class="tabList"></ul>
      </div>

      <div id="reloadPrompt" class="reloadPrompt" role="alert" hidden>
        <span class="reloadIcon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
            <path d="M20 11A8 8 0 1 0 17.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M20 4v7h-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
        <div class="reloadText">
          <p class="reloadTitle" data-i18n="reloadNeeded">Reload to boost this page</p>
          <p class="reloadHint" data-i18n="reloadHint">This tab's audio can't be captured until the page reloads.</p>
        </div>
        <button id="reloadBtn" class="reloadBtn" data-i18n="reloadBtn">Reload</button>
      </div>

      <p id="status" class="statusline"></p>
    </div>

    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
